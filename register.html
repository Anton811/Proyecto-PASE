<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      width: 380px;
    }
    .title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .subtitle {
      font-size: 14px;
      color: #555;
      margin-bottom: 20px;
    }
    .label {
      font-size: 14px;
      margin-bottom: 5px;
    }
    .input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .password-container {
      display: flex;
      align-items: center;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-bottom: 15px;
      padding-right: 8px;
    }
    .password-input {
      flex: 1;
      border: none;
      padding: 10px;
      outline: none;
    }
    .checkbox-container {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      cursor: pointer;
    }
    .checkbox {
      width: 18px;
      height: 18px;
      border: 1px solid #333;
      margin-right: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .btn-primary {
      background: #007bff;
      color: #fff;
      padding: 12px;
      text-align: center;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-primary:hover {
      background: #0056b3;
    }
    .icon {
      cursor: pointer;
      color: #1e62bb;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">Crear Cuenta</div>
    <div class="subtitle">
      Ingresa tus datos abajo 
    </div>

    <div class="label">Nombre</div>
    <input class="input" type="text" placeholder="Juan Pérez">

    <div class="label">Correo electrónico</div>
    <input class="input" type="email" placeholder="ejemplo@gmail.com">

    <div class="label">Teléfono</div>
    <input class="input" type="tel" placeholder="5551234567" maxlength="10">

    <div class="label">Contraseña</div>
    <div class="password-container">
  <input id="password" class="password-input" type="password" placeholder="••••••••">
  <i id="togglePassword" class="fa-solid fa-eye icon"></i>
</div>


    
    <div id="policy-container" class="checkbox-container">
      <div id="checkbox" class="checkbox"></div>
      <span>He leído y acepto el acuerdo de usuario y la política de privacidad</span>
    </div>

    <div id="btn-register" class="btn-primary">Crear Cuenta</div>
  </div>

  <script>
  
  const passwordInput = document.getElementById('password');
  const togglePassword = document.getElementById('togglePassword');
  let showPassword = false;

  togglePassword.addEventListener('click', () => {
    showPassword = !showPassword;
    passwordInput.type = showPassword ? 'text' : 'password';
    togglePassword.classList.toggle('fa-eye', !showPassword);
    togglePassword.classList.toggle('fa-eye-slash', showPassword);
  });

    
    const checkbox = document.getElementById('checkbox');
    let agreePolicy = false;
    document.getElementById('policy-container').addEventListener('click', () => {
      agreePolicy = !agreePolicy;
      checkbox.textContent = agreePolicy ? '✔' : '';
    });


    document.getElementById('btn-register').addEventListener('click', () => {
      if (!agreePolicy) {
        alert('Debes aceptar la política de privacidad para continuar.');
      } else {
        alert('Cuenta creada con éxito. Navegando a Home...');
      }
    });
  </script>
</body>
</html>
