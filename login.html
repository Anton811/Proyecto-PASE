<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pantalla de Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      width: 350px;
    }
    .title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .subtitle {
      font-size: 14px;
      color: #555;
      margin-bottom: 20px;
    }
    .tab-container {
      display: flex;
      margin-bottom: 15px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      border: 1px solid #ccc;
      background: #eee;
    }
    .active-tab {
      background: #007bff;
      color: #fff;
      font-weight: bold;
    }
    .input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .label {
      font-size: 14px;
      margin-bottom: 5px;
    }
    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .checkbox-container {
      display: flex;
      align-items: center;
      cursor: pointer;
    }
    .checkbox {
      width: 18px;
      height: 18px;
      border: 1px solid #333;
      margin-right: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .btn-primary {
      background: #007bff;
      color: #fff;
      padding: 12px;
      text-align: center;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 15px;
    }
    .link {
      color: #007bff;
      cursor: pointer;
    }
    .signup-link {
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">Bienvenido de nuevo</div>
    <div class="subtitle">Ingresa tus datos abajo</div>

    
    <div class="tab-container">
      <div id="tab-email" class="tab active-tab">Correo</div>
      <div id="tab-phone" class="tab">Número móvil</div>
    </div>

   
    <input id="input-dynamic" class="input" type="email" placeholder="ejemplo@gmail.com">

    <div class="label">Contraseña</div>
    <input class="input" type="password" placeholder="••••••••">

    
    <div class="options">
      <div id="remember-container" class="checkbox-container">
        <div id="checkbox" class="checkbox"></div>
        <span>Recuérdame</span>
      </div>
      <div class="link">¿Olvidaste tu contraseña?</div>
    </div>

    <div id="btn-login" class="btn-primary">Iniciar Sesión</div>

    <div class="signup-link">
  ¿No tienes una cuenta? 
  <span class="link" id="btn-register">Registrarse</span>
</div>
  </div>

  <script>
    
    const tabEmail = document.getElementById('tab-email');
    const tabPhone = document.getElementById('tab-phone');
    const inputDynamic = document.getElementById('input-dynamic');

    tabEmail.addEventListener('click', () => {
      tabEmail.classList.add('active-tab');
      tabPhone.classList.remove('active-tab');
      inputDynamic.type = 'email';
      inputDynamic.placeholder = 'ejemplo@gmail.com';
    });

    tabPhone.addEventListener('click', () => {
      tabPhone.classList.add('active-tab');
      tabEmail.classList.remove('active-tab');
      inputDynamic.type = 'tel';
      inputDynamic.placeholder = '555-123-4567';
    });

    
    const checkbox = document.getElementById('checkbox');
    let rememberMe = false;
    document.getElementById('remember-container').addEventListener('click', () => {
      rememberMe = !rememberMe;
      checkbox.textContent = rememberMe ? '✔' : '';
    });

    
    document.getElementById('btn-login').addEventListener('click', () => {
      alert('Navegando a Home...');
    });

    
     document.getElementById('btn-register').addEventListener('click', () => {
    window.location.href = 'register.html'; 
  });
  </script>
</body>
</html>
