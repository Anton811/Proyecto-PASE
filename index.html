<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PASE - Login</title>
  </head>
  <body>
    <div id="main" class="bg-light">
      <div
        class="container d-flex justify-content-center align-items-center vh-100"
      >
        <div class="container bg-white m-5 border rounded-3 shadow-sm px-0">
          <ul class="nav nav-tabs nav-justified">
            <li class="nav-item">
              <a
                class="nav-link active text-danger"
                data-bs-toggle="tab"
                href="#Login"
                >Iniciar Sesion</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link text-danger"
                data-bs-toggle="tab"
                href="#register"
                >Registrarse</a
              >
            </li>
          </ul>
          <div class="tab-content">
            <div class="tab-pane active" id="Login">
              <div class="d-flex justify-content-center m-3">
                <h2>Inicio de Sesión</h2>
              </div>
              <form>
                <div class="form-floating m-3">
                  <input
                    type="email"
                    name="email"
                    id="email"
                    placeholder="Ingresar Correo"
                    class="form-control"
                  />
                  <label for="email" class="text-danger">Correo</label>
                </div>
                <div class="form-floating m-3">
                  <input
                    type="password"
                    name="password"
                    id="password"
                    placeholder="Ingresar Contraseña"
                    class="form-control"
                  />
                  <label for="email" class="text-danger">Contraseña</label>
                </div>

                <div class="d-flex justify-content-center my-5">
                  <input
                    type="submit"
                    value="Iniciar Sesion"
                    class="btn btn-danger fw-bold"
                  />
                </div>
              </form>

              <div class="d-flex justify-content-left m-3">
                <a
                  href="./pages/client/dashboard/"
                  class="text-secondary text-decoration-none fw-bold"
                  >¿Olvidaste la Contraseña?</a
                >
              </div>
            </div>
            <div class="tab-pane fade" id="register">
              <div>
                <h1 class="d-flex justify-content-center m-3">Registrarse</h1>
                <form>
                  <div class="form-floating m-3">
                    <input
                      type="text"
                      name="nombreRegistro"
                      id="nombreRegistro"
                      class="form-control"
                      placeholder="Ingrese Nombre"
                    />
                    <label for="nombreRegistro" class="text-danger"
                      >Nombre(s)</label
                    >
                  </div>
                  <div class="form-floating m-3">
                    <input
                      type="text"
                      name="appRegistro"
                      id="appRegistro"
                      class="form-control"
                      placeholder="Ingrese Apellido Paterno"
                    />
                    <label for="appRegistro" class="text-danger"
                      >Apellido Paterno</label
                    >
                  </div>
                  <div class="form-floating m-3">
                    <input
                      type="text"
                      name="apmRegistro"
                      id="apmRegistro"
                      class="form-control"
                      placeholder="Ingrese Apellido Materno"
                    />
                    <label for="apmRegistro" class="text-danger"
                      >Apellido Materno (Opcional)</label
                    >
                  </div>
                  <div class="form-floating m-3">
                    <input
                      type="email"
                      name="emailRegistro"
                      id="emailRegistro"
                      class="form-control"
                      placeholder="Ingrese Correo"
                    />
                    <label for="emailRegistro" class="text-danger"
                      >Correo Electronico</label
                    >
                  </div>
                  <div class="form-floating m-3">
                    <input
                      type="password"
                      name="passwordRegistro"
                      id="passwordRegistro"
                      placeholder="Registrar Contraseña"
                      class="form-control"
                    />
                    <label for="passwordRegistro" class="text-danger"
                      >Contraseña</label
                    >
                  </div>
                  <div class="form-floating m-3">
                    <input
                      type="password"
                      name="confirmarPasswordRegistro"
                      id="confirmarPasswordRegistro"
                      placeholder="Registrar Contraseña"
                      class="form-control"
                    />
                    <label for="confirmarPasswordRegistro" class="text-danger"
                      >Confirmar Contraseña</label
                    >
                  </div>
                  <div class="m-4 d-flex justify-content-center">
                    <input
                      type="submit"
                      value="Registrarse"
                      class="btn btn-danger"
                    />
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
