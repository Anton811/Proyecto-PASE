<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PASE - Login</title>
  </head>
  <body>
    <div id="main">
      <div
        class="container d-flex justify-content-center align-items-center vh-100"
      >
        <div class="container bg-light m-5">
          <div class="d-flex justify-content-center m-3">
            <h2>Inicio de Sesión</h2>
          </div>
          <form>
            <div class="form-floating m-3">
              <input
                type="email"
                name="email"
                id="email"
                placeholder="Ingresar Correo"
                class="form-control"
              />
              <label for="email" class="text-danger">Correo</label>
            </div>
            <div class="form-floating m-3">
              <input
                type="password"
                name="password"
                id="password"
                placeholder="Ingresar Contraseña"
                class="form-control"
              />
              <label for="email" class="text-danger">Contraseña</label>
            </div>

            <div class="d-flex justify-content-center my-5">
              <input
                type="submit"
                value="Iniciar Sesion"
                class="btn btn-danger fw-bold"
              />
            </div>
          </form>

          <div class="d-flex justify-content-between m-3">
            <a
              href="/pages/client/dashboard/"
              class="text-secondary text-decoration-none fw-bold"
              >¿Olvidaste la Contraseña?</a
            >
            <a href="" class="text-danger text-decoration-none fw-bold"
              >Registrarse</a
            >
          </div>
        </div>
      </div>
    </div>

    <!-- <script type="module" src="/src/main.js"></script> -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
