<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous">
      <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-4">
        <i class="bi bi-arrow-left text-danger fs-3" onclick="regresar()" style="cursor:pointer;"></i>

        <h4 class="text-center mt-3">Cajón seleccionado</h4>
        <hr>

        <div class="text-center">
            <div id="cajon" class="cajon-box">C1</div>
        </div>
        <hr>

        <div class="reserva-box p-3 mt-3">
            <h6 class="text-center">Reserva</h6>

            <div class="d-flex justify-content-between mt-3">
                <input type="date" id="fecha" class="form-control me-2">
                <input type="time" id="hora" class="form-control">
            </div>

            <p id="mensaje" class="text-danger mt-2 text-center"></p>

            <div class="text-center mt-3">
                <button class="btn btn-azul" onclick="confirmarReserva()">Confirmar reserva</button>
            </div>
        </div>
    </div>
</body>
</html>
