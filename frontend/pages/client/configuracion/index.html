<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configuracion</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <!-- SlideBar para buscar otras opciones -->
    <div class="offcanvas offcanvas-start" id="nav"></div>

    <div id="main" class="bg-light">
      <div>
        <button class="btn" data-bs-toggle="offcanvas" data-bs-target="#nav">
          <img
            src="/src/assets/MenuBar.svg"
            style="width: 40px; height: 40px"
            viewBox="0 0 16 16"
          />
        </button>
      </div>
      <div class="m-3 bg-white border rounded-3 p-3">
        <h3>Informacion Personal</h3>
        <div class="my-4">
          <p class="fw-bold m-0">Usuario Anonimo</p>
          <p class="text-secondary">Miembro desde 2026</p>
        </div>
        <div>
          <form>
            <div>
              <label for="nombre" class="form-label">Nombre</label>
              <input
                type="text"
                name="nombre"
                id="nombre"
                class="form-control"
              />
            </div>
            <div>
              <label for="app" class="form-label">Apellido Paterno</label>
              <input type="text" name="app" id="app" class="form-control" />
            </div>
            <div>
              <label for="apm" class="form-label">Apellido Materno</label>
              <input type="text" name="app" id="app" class="form-control" />
            </div>
            <div>
              <label for="email" class="form-label">Correo Electronico</label>
              <input
                type="email"
                name="email"
                id="email"
                class="form-control"
                disabled
              />
            </div>
            <div>
              <label for="tel" class="form-label">Telefono</label>
              <input type="tel" name="tel" id="tel" class="form-control" />
            </div>
            <div class="mt-4 d-flex">
              <button class="btn btn-primary d-flex">Modificar</button>
              <input
                type="button"
                value="Guardar Cambios"
                class="btn btn-danger d-flex ms-auto invisible"
              />
            </div>
          </form>
        </div>
      </div>
      <div class="m-3 bg-white border rounded-3 p-3">
        <div class="d-flex">
          <h3>Mis Vehiculos</h3>
          <button class="btn btn-danger ms-auto">+ Agregar Vehiculo</button>
        </div>
        <div class="border shadow-sm border rounded-3 p-2 my-2">
          <div class="row">
            <div class="col-10">
              <h5>Toyota Corolla</h5>
              <div class="d-flex">
                <div class="text-secondary">ACB-1234</div>

                <div class="text-secondary">Gris Plata</div>
              </div>
            </div>
            <div class="col-2 d-flex align-items-center justify-content-center">
              <button class="btn">
                <img src="/Delete.svg" style="width: 30px; height: 30px" />
              </button>
            </div>
          </div>
        </div>
        <div class="border shadow-sm border rounded-3 p-2 my-2">
          <div class="row">
            <div class="col-10">
              <h5>Toyota Corolla</h5>
              <div class="d-flex">
                <div class="text-secondary">ACB-1234</div>

                <div class="text-secondary">Gris Plata</div>
              </div>
            </div>
            <div class="col-2 d-flex align-items-center justify-content-center">
              <button class="btn">
                <img src="/Delete.svg" style="width: 30px; height: 30px" />
              </button>
            </div>
          </div>
        </div>
        <div class="border shadow-sm border rounded-3 p-2 my-2">
          <div class="row">
            <div class="col-10">
              <h5>Toyota Corolla</h5>
              <div class="d-flex">
                <div class="text-secondary">ACB-1234</div>

                <div class="text-secondary">Gris Plata</div>
              </div>
            </div>
            <div class="col-2 d-flex align-items-center justify-content-center">
              <button class="btn">
                <img src="/Delete.svg" style="width: 30px; height: 30px" />
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="m-3 bg-white border rounded-3 p-3">
        <div class="d-flex">
          <h3>Metodos de Pago</h3>
          <button class="btn btn-danger ms-auto">+ Agregar Tarjeta</button>
        </div>
        <div class="border shadow-sm border rounded-3 my-2 p-3">
          <div class="row">
            <div class="col-2 d-flex align-items-center justify-content-center">
              <h5 class="bg-primary p-2 border rounded text-light fw-bold">
                VISA
              </h5>
            </div>
            <div class="col-8">
              <h5>•••• •••• •••• 1234</h5>
              <div class="text-secondary">Expira 12/26</div>
            </div>
            <div class="col-2 d-flex align-items-center justify-content-center">
              <button class="btn">
                <img src="/Delete.svg" style="width: 30px; height: 30px" />
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/slidebarClient.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
