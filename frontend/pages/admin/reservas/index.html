<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <title>Reservas</title>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-sm bg-dark" id="navAdmin"></nav>

    <div>
      <h1 class="mx-5 my-3">Administrador de Reservas</h1>
      <div class="mx-5 my-3">
        <div class="row">
          <div class="col bg-white m-3 p-3 rounded-5 shadow">
            <h4>Reservas Hoy</h4>
            <h3 class="fw-bold">123</h3>
          </div>
          <div class="col bg-white m-3 p-3 rounded-5 shadow">
            <h4>En Parking</h4>
            <h3 class="fw-bold">45</h3>
          </div>
        </div>
        <div class="row">
          <div class="col bg-white m-3 p-3 rounded-5 shadow">
            <h4>Finalizadas</h4>
            <h3 class="fw-bold">67</h3>
          </div>
          <div class="col bg-white m-3 p-3 rounded-5 shadow">
            <h4>Canceladas</h4>
            <h3 class="fw-bold">8</h3>
          </div>
        </div>
      </div>
      <div class="mx-5 bg-white rounded-5 shadow p-3">
        <form>
          <div class="container my-3 mx-1">
            <input
              type="text"
              name="buscar"
              id="buscar"
              class="form-control bg-light mx-0"
              placeholder="🔍 Buscar por ID, Cliente o Matricula"
            />
          </div>
          <div>
            <div class="d-flex justify-content-center my-3">
              <button class="btn btn-primary mx-2">Todos</button>
              <button class="btn btn-success mx-2">En curso</button>
              <button class="btn btn-warning mx-2">Pendiente</button>
              <button class="btn btn-danger mx-2">Finalizada</button>
            </div>
          </div>
        </form>
      </div>
      <div class="conatiner m-5 p-1 rounded-5 bg-white shadow">
        <table class="table table-hover">
          <thead>
            <th>id</th>
            <th>Cliente</th>
            <th>Plaza</th>
            <th>Horario</th>
            <th>Estado</th>
            <th>Acciones</th>
          </thead>
          <tbody>
            <tr>
              <td>
                <p>123</p>
              </td>
              <td>
                <p class="fw-bold mb-0">Emilio Escarraga</p>
                <p class="text-secondary">emilio.esca@gmail.com</p>
              </td>
              <td><p>A-10</p></td>
              <td><p>10:30 - 12:30</p></td>
              <td><p>En curso</p></td>
              <td></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script src="/src/slidebarAdmin.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
