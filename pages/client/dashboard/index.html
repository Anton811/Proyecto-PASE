<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PASE - Dashboard</title>
  </head>
  <body>
    <div id="main">
      <!-- SlideBar para buscar otras opciones -->
      <div class="offcanvas offcanvas-start" id="nav">
        <div class="offcanvas-header">
          <h1 class="offcanvas-title">Cliente</h1>
          <button
            class="btn-close text-reset"
            data-bs-dismiss="offcanvas"
          ></button>
        </div>
      </div>

      <!-- Informacion principal -->
      <div class="container mx-0">
        <button class="btn" data-bs-toggle="offcanvas" data-bs-target="#nav">
          <img
            src="/src/assets/MenuBar.svg"
            style="width: 32px; height: 32px"
            viewBox="0 0 16 16"
          />
        </button>
      </div>
    </div>
    <!-- <script type="module" src="dashboard.js"></script> -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
