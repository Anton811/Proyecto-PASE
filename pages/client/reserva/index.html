<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Nueva Reserva</title>
  </head>
  <body>
    <!-- SlideBar para buscar otras opciones -->
    <div class="offcanvas offcanvas-start" id="nav"></div>

    <div id="main">
      <div>
        <div class="d-flex justify-content-between">
          <div class="">
            <button
              class="btn"
              data-bs-toggle="offcanvas"
              data-bs-target="#nav"
            >
              <img
                src="/src/assets/MenuBar.svg"
                style="width: 40px; height: 40px"
                viewBox="0 0 16 16"
              />
            </button>
          </div>
          <div class="d-flex my-3 me-5">
            <a href="/pages/client/reserva/" class="text-decoration-none">
              <button
                class="btn btn-danger fw-bold shadow mx-auto d-flex"
                id="nueva-reserva"
              >
                Regresar
              </button>
            </a>
          </div>
        </div>
      </div>

      <div class="container"><h2>Detalles de la reserva</h2></div>
      <div class="container">
        <form action="">
          <div>
            <label for="location" class="my-2 fw-bold">Ubicacion</label>
            <div class="row">
              <div class="col-sm-6 my-2">
                <div class="form-floating">
                  <select name="estado" id="estado" class="form-control">
                    <option value="Nuevo-Leon"></option>
                    <option value="Oaxaca">Oaxaca</option>
                    <option value="Coahuila">Coahuila</option>
                    <option value="Aguascalientes">Aguascalientes</option>
                    <option value="Estado-de-Mexico">Estado de Mexico</option>
                  </select>
                  <label for="estado" class="text-danger">Estado</label>
                </div>
              </div>
              <div class="col-sm-6 my-2">
                <div class="form-floating">
                  <select name="estado" id="estado" class="form-control">
                    <option value="Nuevo-Leon"></option>
                    <option value="Oaxaca">Oaxaca</option>
                    <option value="Coahuila">Coahuila</option>
                    <option value="Aguascalientes">Aguascalientes</option>
                    <option value="Estado-de-Mexico">Estado de Mexico</option>
                  </select>
                  <label for="estado" class="text-danger">Municipio</label>
                </div>
              </div>
            </div>
            <div>
              <div class="form-floating my-3">
                <select name="estado" id="estado" class="form-control">
                  <option value="Nuevo-Leon"></option>
                  <option value="Oaxaca">Oaxaca</option>
                  <option value="Coahuila">Coahuila</option>
                  <option value="Aguascalientes">Aguascalientes</option>
                  <option value="Estado-de-Mexico">Estado de Mexico</option>
                </select>
                <label for="estado" class="text-danger">Sucursal</label>
              </div>
            </div>
          </div>
          <div class="d-flex justify-content-center my-3">
            <button type="submit" class="btn btn-danger m-2 shadow fw-bold">
              Nueva Busqueda
            </button>
            <button class="btn btn-secondary m-2 shadow fw-bold">
              Limpiar Busqueda
            </button>
          </div>
        </form>
      </div>

      <!-- Contenedor de estacionamiento seleccionable -->
      <div class="container">
        <div id="estacionamiento" class="container"></div>
      </div>
    </div>

    <script type="module" src="/src/slidebarClient.js"></script>
    <script src="/pages/client/reserva/script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
